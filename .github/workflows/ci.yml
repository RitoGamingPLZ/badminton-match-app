name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=frontend

  backend-check:
    name: Backend — Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check syntax (node --check)
        run: find backend/src -name "*.js" | xargs node --check

  terraform-validate:
    name: Terraform — Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Terraform Init (local backend, no credentials needed)
        working-directory: infra/gcp
        run: terraform init -backend=false

      - name: Terraform Validate — GCP
        working-directory: infra/gcp
        run: terraform validate
        env:
          TF_VAR_project_id: ci-placeholder
          TF_VAR_backend_image: ci-placeholder

      - name: Terraform Format check
        working-directory: infra/gcp
        run: terraform fmt -check -recursive
