name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Backend — Build Lambda zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=backend

      - name: Build Lambda zip
        run: npm run build --workspace=backend

      - name: Upload Lambda zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: backend/dist/lambda.zip
          retention-days: 1

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=frontend

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  terraform-apply:
    name: Terraform — Apply
    runs-on: ubuntu-latest
    needs: [build-backend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: backend/dist/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="allowed_origin=${{ secrets.ALLOWED_ORIGIN || '*' }}"

  deploy-frontend:
    name: Frontend — Deploy to S3
    runs-on: ubuntu-latest
    needs: [build-frontend, terraform-apply]
    environment: production
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://badminton-match-app-frontend --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://badminton-match-app-frontend/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
