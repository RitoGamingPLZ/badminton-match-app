name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Backend — Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        id: push
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/badminton-backend/badminton-backend:${{ github.sha }}"
          docker build -t "$IMAGE" backend/
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  provision-infra:
    name: Terraform — Apply
    runs-on: ubuntu-latest
    environment: production
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Terraform Init
        working-directory: infra/gcp
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/gcp
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT }}" \
            -var="bucket_name=${{ secrets.GCS_BUCKET_NAME }}" \
            -var="backend_image=${{ needs.build-backend.outputs.image }}"

  deploy-frontend:
    name: Frontend — Deploy to GCS
    runs-on: ubuntu-latest
    needs: [build-frontend, provision-infra]
    environment: production
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync assets to GCS (long-lived cache)
        run: |
          gsutil -m rsync -r -d \
            -x "index\.html$" \
            frontend/dist/ gs://${{ secrets.GCS_BUCKET_NAME }}/
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://${{ secrets.GCS_BUCKET_NAME }}/**"

      - name: Upload index.html (no-cache)
        run: |
          gsutil cp \
            -h "Cache-Control:no-cache, no-store, must-revalidate" \
            frontend/dist/index.html \
            gs://${{ secrets.GCS_BUCKET_NAME }}/index.html
