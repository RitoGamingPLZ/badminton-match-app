services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # Switch the database driver here (mongodb | dynamodb | memory)
      DB_DRIVER: ${DB_DRIVER:-mongodb}

      # MongoDB (used when DB_DRIVER=mongodb)
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB:  badminton

      # DynamoDB Local (used when DB_DRIVER=dynamodb)
      DYNAMODB_ENDPOINT:     http://dynamodb-local:8000
      AWS_REGION:            us-east-1
      AWS_ACCESS_KEY_ID:     local
      AWS_SECRET_ACCESS_KEY: local
      TABLE_NAME:            BadmintonRooms

      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── DynamoDB Local (optional — enable with: docker compose --profile dynamodb up) ──
  dynamodb-local:
    profiles: [dynamodb]
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped

  # ── DynamoDB table bootstrap (runs once, then exits) ──────────────────────
  dynamodb-init:
    profiles: [dynamodb]
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID:     local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION:    us-east-1
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for DynamoDB Local...' &&
        sleep 3 &&
        aws dynamodb create-table
          --table-name BadmintonRooms
          --attribute-definitions AttributeName=code,AttributeType=S
          --key-schema AttributeName=code,KeyType=HASH
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb-local:8000 || true &&
        aws dynamodb update-time-to-live
          --table-name BadmintonRooms
          --time-to-live-specification Enabled=true,AttributeName=ttl
          --endpoint-url http://dynamodb-local:8000 || true &&
        echo 'DynamoDB init done'
      "
    depends_on:
      - dynamodb-local

volumes:
  mongo_data:
