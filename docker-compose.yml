services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
    ports:
      - "3001:3001"
    environment:
      # Switch the database driver here (mongodb | dynamodb | memory)
      DB_DRIVER: ${DB_DRIVER:-mongodb}

      # MongoDB (used when DB_DRIVER=mongodb)
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB:  badminton

      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:5173}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reloading; keep container's node_modules intact
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      # Vite proxy target — points to the backend service inside Docker network
      API_TARGET: http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo_data:
