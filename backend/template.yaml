AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Badminton Match App — Lambda + DynamoDB backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 900        # 15 min (max Lambda) — needed for long SSE connections
    MemorySize: 256
    Architectures:
      - arm64           # Graviton2 — cheaper + faster for Node.js
    Environment:
      Variables:
        TABLE_NAME: !Ref RoomsTable
        ALLOWED_ORIGIN: '*'   # Restrict to your frontend domain in production
    Tracing: Active

Parameters:
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: CORS allowed origin (e.g. https://your-frontend.vercel.app)

Resources:

  # ── Lambda function ──────────────────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm             # ESM output for Node.js 20
        OutExtension:
          - .js=.mjs
        EntryPoints:
          - src/handler.js
        External:               # Already bundled in the Lambda runtime
          - '@aws-sdk/*'
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    Properties:
      FunctionName: badminton-api
      Handler: src/handler.handler
      CodeUri: .
      Description: Handles all REST routes and SSE streaming
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM   # Required for SSE
        Cors:
          AllowOrigins:
            - !Ref AllowedOrigin
          AllowHeaders:
            - Content-Type
            - X-Host-Token
          AllowMethods:
            - GET
            - POST
            - PATCH
            - OPTIONS
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RoomsTable

  # ── DynamoDB table ───────────────────────────────────────────────────────────
  RoomsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BadmintonRooms
      BillingMode: PAY_PER_REQUEST    # On-demand; free tier covers hobby use
      AttributeDefinitions:
        - AttributeName: code
          AttributeType: S
      KeySchema:
        - AttributeName: code
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true                 # Rooms auto-delete after 24 hours

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: >
      Lambda Function URL — use this as VITE_API_BASE in the frontend .env
    Value: !GetAtt ApiFunctionUrl.FunctionUrl
    Export:
      Name: BadmintonApiUrl

  TableName:
    Description: DynamoDB table name
    Value: !Ref RoomsTable
